<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluviago — Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --coral:      #E8533F;
            --coral-h:    #D4422E;
            --charcoal:   #222222;
            --text-muted: #9A9090;
            --border:     #E4DCDA;
            --bg:         #F0EBEA;
            --input-bg:   #FAFAF9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ── Card ── */
        .login-card {
            display: flex;
            width: 100%;
            max-width: 920px;
            min-height: 520px;
            background: #fff;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 20px 70px rgba(0,0,0,0.10), 0 4px 20px rgba(0,0,0,0.05);
        }

        /* ══════════════════════════════
           LEFT PANEL — Form
        ══════════════════════════════ */
        .panel-left {
            flex: 1;
            padding: 52px 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .panel-left h1 {
            font-size: 38px;
            font-weight: 800;
            color: var(--charcoal);
            letter-spacing: -0.5px;
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .panel-left .subtitle {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-muted);
            margin-bottom: 36px;
        }

        /* Field labels */
        .field-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: var(--charcoal);
            margin-bottom: 9px;
        }

        /* Input wrapper with icon */
        .input-wrap {
            position: relative;
            margin-bottom: 20px;
        }

        .input-wrap .icon-left {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #C8BEBB;
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        .input-wrap .icon-left svg {
            width: 16px;
            height: 16px;
            stroke: #C8BEBB;
            fill: none;
        }

        .input-wrap input {
            width: 100%;
            padding: 13px 16px 13px 44px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            color: var(--charcoal);
            background: var(--input-bg);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrap input:focus {
            border-color: var(--coral);
            box-shadow: 0 0 0 3px rgba(232,83,63,0.10);
            background: #fff;
        }

        .input-wrap input::placeholder {
            color: #C8BEBB;
        }

        /* Password right-side toggle */
        .input-wrap .icon-right {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #C8BEBB;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 4px;
            transition: color 0.15s;
        }

        .input-wrap .icon-right:hover { color: var(--coral); }

        .input-wrap .icon-right svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
        }

        /* Password input needs right padding for eye icon */
        .input-wrap.password-wrap input {
            padding-right: 44px;
        }

        /* ── Remember / Forgot row ── */
        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }

        .remember-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--charcoal);
            font-weight: 500;
            cursor: pointer;
        }

        .remember-label input[type="checkbox"] {
            accent-color: var(--coral);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-link {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.15s;
        }

        .forgot-link:hover { color: var(--coral); }

        /* ── Sign In button ── */
        .btn-signin {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            background: var(--coral);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 6px 24px rgba(232,83,63,0.28);
        }

        .btn-signin:hover {
            background: var(--coral-h);
            transform: translateY(-1px);
            box-shadow: 0 10px 32px rgba(232,83,63,0.38);
        }

        .btn-signin:active { transform: translateY(0); }

        .btn-signin.loading {
            opacity: 0.80;
            pointer-events: none;
        }

        /* ── Error message ── */
        .error-msg {
            background: rgba(232,83,63,0.08);
            border: 1px solid rgba(232,83,63,0.22);
            border-radius: 10px;
            padding: 11px 15px;
            color: var(--coral-h);
            font-size: 13px;
            margin-bottom: 18px;
            display: none;
        }

        .error-msg.show { display: block; }

        /* ══════════════════════════════
           RIGHT PANEL — Welcome
           Solid coral, static decorative circles only
        ══════════════════════════════ */
        .panel-right {
            flex: 1;
            background: var(--coral);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 52px 44px;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        /* Static circle — top-right */
        .panel-right::before {
            content: '';
            position: absolute;
            top: -90px;
            right: -90px;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: rgba(255,255,255,0.13);
            pointer-events: none;
        }

        /* Static circle — bottom-left */
        .panel-right::after {
            content: '';
            position: absolute;
            bottom: -90px;
            left: -70px;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: rgba(255,255,255,0.10);
            pointer-events: none;
        }

        .right-inner {
            position: relative;
            z-index: 1;
        }

        .right-brand {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.90);
            margin-bottom: 20px;
        }

        .panel-right h2 {
            font-size: 34px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.4px;
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .panel-right p {
            font-size: 14px;
            color: rgba(255,255,255,0.80);
            margin-bottom: 28px;
        }

        .btn-signup {
            padding: 12px 40px;
            border: 2px solid rgba(255,255,255,0.80);
            border-radius: 50px;
            background: transparent;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
        }

        .btn-signup:hover {
            background: #fff;
            color: var(--coral);
            border-color: #fff;
            transform: translateY(-1px);
        }

        /* ── Responsive ── */
        @media (max-width: 720px) {
            .login-card {
                flex-direction: column-reverse;
                max-width: 420px;
                min-height: auto;
            }

            .panel-right {
                padding: 36px 30px;
                min-height: 210px;
            }

            .panel-left {
                padding: 36px 28px;
            }

            .panel-left h1 { font-size: 28px; }
            .panel-right h2 { font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="login-card">

    <!-- LEFT: Sign In Form -->
    <div class="panel-left">
        <h1>Sign In</h1>
        <p class="subtitle">Welcome back to Pluviago</p>

        <div class="error-msg" id="errorMsg">
            Invalid username or password. Please try again.
        </div>

        <form id="loginForm" autocomplete="on">

            <!-- USERNAME -->
            <label class="field-label" for="login_email">Username</label>
            <div class="input-wrap">
                <span class="icon-left">
                    <!-- Person icon -->
                    <svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </span>
                <input type="text" id="login_email" name="usr"
                       placeholder="Enter your email or username"
                       autocomplete="username" required>
            </div>

            <!-- PASSWORD -->
            <label class="field-label" for="login_password">Password</label>
            <div class="input-wrap password-wrap">
                <span class="icon-left">
                    <!-- Lock icon -->
                    <svg viewBox="0 0 24 24" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
                <input type="password" id="login_password" name="pwd"
                       placeholder="Enter your password"
                       autocomplete="current-password" required>
                <button type="button" class="icon-right" id="togglePwd" tabindex="-1">
                    <!-- Eye icon -->
                    <svg id="eyeIcon" viewBox="0 0 24 24" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>

            <!-- Remember Me + Forgot Password -->
            <div class="bottom-row">
                <label class="remember-label">
                    <input type="checkbox" checked> Remember Me
                </label>
                <a href="/forgot-password" class="forgot-link">Forgot Password</a>
            </div>

            <!-- Sign In -->
            <button type="submit" class="btn-signin" id="btnSignin">Sign In</button>

        </form>
    </div>

    <!-- RIGHT: Welcome Panel -->
    <div class="panel-right">
        <div class="right-inner">
            <div class="right-brand">PLUVIAGO</div>
            <h2>Welcome to login</h2>
            <p>Don't have an account?</p>
            <button class="btn-signup" onclick="window.location.href='/signup'">Sign Up</button>
        </div>
    </div>

</div>

<script>
    // Password visibility toggle
    const togglePwd = document.getElementById('togglePwd');
    const pwdInput  = document.getElementById('login_password');
    const eyeIcon   = document.getElementById('eyeIcon');

    const eyeOpen   = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    const eyeClosed = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';

    togglePwd.addEventListener('click', function () {
        const show = pwdInput.type === 'password';
        pwdInput.type = show ? 'text' : 'password';
        eyeIcon.innerHTML = show ? eyeClosed : eyeOpen;
    });

    // Form submission — Frappe login API
    const loginForm = document.getElementById('loginForm');
    const btnSignin = document.getElementById('btnSignin');
    const errorMsg  = document.getElementById('errorMsg');

    function getCookie(name) {
        const v = `; ${document.cookie}`, parts = v.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return '';
    }

    loginForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        errorMsg.classList.remove('show');
        btnSignin.classList.add('loading');
        btnSignin.textContent = 'Signing in…';

        const usr = document.getElementById('login_email').value.trim();
        const pwd = document.getElementById('login_password').value;

        if (!usr || !pwd) {
            showError('Please enter both username and password.');
            return;
        }

        try {
            let csrfToken = '';
            try {
                const r = await fetch('/api/method/frappe.sessions.get_csrf_token', { credentials: 'same-origin' });
                if (r.ok) {
                    const d = await r.json();
                    csrfToken = (typeof d.message === 'string') ? d.message
                              : (d.message?.csrf_token || d.csrf_token || '');
                }
            } catch (_) {
                csrfToken = getCookie('csrf_token') || '';
            }

            const headers = { 'Content-Type': 'application/json' };
            if (csrfToken) headers['X-Frappe-CSRF-Token'] = csrfToken;

            const res  = await fetch('/api/method/login', {
                method: 'POST', headers,
                body: JSON.stringify({ usr, pwd }),
                credentials: 'same-origin'
            });
            const data = await res.json();

            if (res.ok && data.message) {
                const ok = data.message.full_name || data.message === 'Logged In'
                        || (typeof data.message === 'object' && data.message.full_name);
                if (ok) {
                    const to = new URLSearchParams(window.location.search).get('redirect-to') || '/app';
                    window.location.href = to;
                    return;
                }
                showError(data.message || 'Invalid credentials.');
            } else {
                const msg = data.message || data.exc || data.error || 'Invalid credentials.';
                showError(typeof msg === 'string' ? msg : 'An error occurred during login.');
            }
        } catch (err) {
            showError('Unable to connect. Please check your network and try again.');
        }
    });

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add('show');
        btnSignin.classList.remove('loading');
        btnSignin.textContent = 'Sign In';
    }

    document.getElementById('login_email').focus();
</script>

</body>
</html>
