<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluviago — Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --coral: #E8533F;
            --coral-light: #F17A6A;
            --coral-dark: #C9402E;
            --coral-glow: #FF6F5E;
            --charcoal: #1A1A1A;
            --charcoal-light: #2D2D2D;
            --warm-white: #FFF8F6;
            --warm-gray: #F5F0EE;
            --text-muted: #8A7E7A;
            --gradient-coral: linear-gradient(135deg, #E8533F 0%, #F17A6A 40%, #FF6F5E 100%);
            --gradient-coral-deep: linear-gradient(160deg, #C9402E 0%, #E8533F 50%, #F17A6A 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--warm-gray);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(232, 83, 63, 0.08), 0 8px 30px rgba(0,0,0,0.06);
            overflow: hidden;
            max-width: 950px;
            width: 100%;
            display: flex;
            min-height: 540px;
        }

        /* LEFT PANEL — Form */
        .login-left {
            flex: 1;
            padding: 50px 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-left h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--charcoal);
            margin-bottom: 6px;
        }

        .login-left .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
            font-weight: 400;
        }

        .left-logo-row {
            margin-bottom: 28px;
        }

        .left-logo-img {
            height: 52px;
            width: auto;
            object-fit: contain;
        }

        .form-label-custom {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--charcoal);
            margin-bottom: 8px;
            display: block;
        }

        .form-input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #e8e0dd;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            color: var(--charcoal);
            background: var(--warm-white);
            transition: all 0.25s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--coral);
            box-shadow: 0 0 0 3px rgba(232, 83, 63, 0.1);
            background: #fff;
        }

        .form-input::placeholder {
            color: #c4b8b4;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .btn-signin {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            background: var(--gradient-coral);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 25px rgba(232, 83, 63, 0.3);
            margin-top: 4px;
        }

        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 35px rgba(232, 83, 63, 0.4);
        }

        .btn-signin:active {
            transform: translateY(0);
        }

        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--coral);
            font-weight: 500;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            accent-color: var(--coral);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-link {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: var(--coral);
        }

        /* RIGHT PANEL — Welcome */
        .login-right {
            flex: 1;
            background: var(--gradient-coral-deep);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 40px;
            position: relative;
            overflow: hidden;
        }

        .login-right::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
        }

        .login-right::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: -40px;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
        }

        .right-brand-name {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.95);
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }

        .login-right h2 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .login-right p {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-bottom: 28px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .btn-signup {
            padding: 11px 36px;
            border: 2px solid rgba(255,255,255,0.7);
            border-radius: 50px;
            background: transparent;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }

        .btn-signup:hover {
            background: #fff;
            color: var(--coral);
            border-color: #fff;
            transform: translateY(-2px);
        }

        /* Loading spinner */
        .btn-signin .spinner-border {
            width: 18px;
            height: 18px;
            border-width: 2px;
            margin-right: 8px;
            display: none;
        }

        .btn-signin.loading .spinner-border {
            display: inline-block;
        }

        .btn-signin.loading {
            opacity: 0.85;
            pointer-events: none;
        }

        /* Error message */
        .error-msg {
            background: rgba(232, 83, 63, 0.08);
            border: 1px solid rgba(232, 83, 63, 0.2);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--coral-dark);
            font-size: 13px;
            margin-bottom: 18px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        /* Password toggle */
        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: var(--coral);
        }

        .login-left {
            position: relative;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .login-container {
                flex-direction: column-reverse;
                max-width: 440px;
                min-height: auto;
            }

            .login-right {
                padding: 36px 30px;
                min-height: 200px;
                border-radius: 0;
            }

            .login-left {
                padding: 36px 30px;
            }

            .left-logo-row {
                position: static;
                margin-bottom: 16px;
            }

            .left-logo-img {
                height: 40px;
            }

            .login-right h2 {
                font-size: 22px;
            }
        }

        /* Frappe overrides — strip Frappe's default page styles */
        .page-card { border: none !important; box-shadow: none !important; padding: 0 !important; }
        .for-login .page-card-head { display: none !important; }
        .for-login #login_area { padding: 0 !important; }
        .for-login .field-area { margin: 0 !important; }
    </style>
</head>
<body>

<div class="login-container">
    <!-- LEFT: Sign In Form -->
    <div class="login-left">
        <div class="left-logo-row">
            <img src="/files/pluviago-logo.jpeg" alt="Pluviago" class="left-logo-img" onerror="this.style.display='none'">
        </div>

        <h2>Sign In</h2>
        <p class="subtitle">Welcome back to Pluviago</p>

        <div class="error-msg" id="errorMsg">
            Invalid username or password. Please try again.
        </div>

        <form id="loginForm" autocomplete="on">
            <div class="form-group">
                <label class="form-label-custom" for="login_email">Username</label>
                <input type="text" class="form-input" id="login_email" name="usr" placeholder="Enter your email or username" autocomplete="username" required>
            </div>

            <div class="form-group">
                <label class="form-label-custom" for="login_password">Password</label>
                <div class="password-wrapper">
                    <input type="password" class="form-input" id="login_password" name="pwd" placeholder="Enter your password" autocomplete="current-password" required>
                    <button type="button" class="password-toggle" id="togglePwd" tabindex="-1">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-signin" id="btnSignin">
                <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                Sign In
            </button>
        </form>

        <div class="bottom-row">
            <label class="remember-me">
                <input type="checkbox" checked> Remember Me
            </label>
            <a href="/forgot-password" class="forgot-link">Forgot Password</a>
        </div>
    </div>

    <!-- RIGHT: Welcome Panel -->
    <div class="login-right">
        <div class="right-brand-name">PLUVIAGO</div>
        <h2>Welcome to login</h2>
        <p>Don't have an account?</p>
        <button class="btn-signup" onclick="window.location.href='/signup'">Sign Up</button>
    </div>
</div>

<script>
    // Helper function to get cookie value
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return '';
    }

    // Password visibility toggle
    const togglePwd = document.getElementById('togglePwd');
    const pwdInput = document.getElementById('login_password');
    togglePwd.addEventListener('click', function () {
        const isPassword = pwdInput.type === 'password';
        pwdInput.type = isPassword ? 'text' : 'password';
        this.querySelector('i').classList.toggle('fa-eye');
        this.querySelector('i').classList.toggle('fa-eye-slash');
    });

    // Form submission — Frappe login API
    const loginForm = document.getElementById('loginForm');
    const btnSignin = document.getElementById('btnSignin');
    const errorMsg = document.getElementById('errorMsg');

    loginForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        errorMsg.classList.remove('show');
        btnSignin.classList.add('loading');

        const usr = document.getElementById('login_email').value.trim();
        const pwd = document.getElementById('login_password').value;

        if (!usr || !pwd) {
            errorMsg.textContent = 'Please enter both username and password.';
            errorMsg.classList.add('show');
            btnSignin.classList.remove('loading');
            return;
        }

        try {
            // Get CSRF token first - handle different response formats
            let csrfToken = '';
            try {
                const csrfResponse = await fetch('/api/method/frappe.sessions.get_csrf_token', {
                    method: 'GET',
                    credentials: 'same-origin'
                });
                
                if (csrfResponse.ok) {
                    const csrfData = await csrfResponse.json();
                    // Handle different response formats
                    if (typeof csrfData.message === 'string') {
                        csrfToken = csrfData.message;
                    } else if (csrfData.message && typeof csrfData.message === 'object' && csrfData.message.csrf_token) {
                        csrfToken = csrfData.message.csrf_token;
                    } else if (csrfData.csrf_token) {
                        csrfToken = csrfData.csrf_token;
                    }
                }
            } catch (csrfErr) {
                console.warn('CSRF token fetch failed, trying cookie fallback:', csrfErr);
                // Try to get from cookie as fallback
                csrfToken = getCookie('csrf_token') || getCookie('frappe.csrf_token') || '';
            }

            // Prepare headers
            const headers = {
                'Content-Type': 'application/json'
            };
            if (csrfToken) {
                headers['X-Frappe-CSRF-Token'] = csrfToken;
            }

            // Perform login
            const res = await fetch('/api/method/login', {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({ usr, pwd }),
                credentials: 'same-origin'
            });

            const data = await res.json();

            if (res.ok && data.message) {
                // Check if login was successful
                if (data.message.full_name || data.message === 'Logged In' || (typeof data.message === 'object' && data.message.full_name)) {
                    // Login successful - redirect to desk
                    const redirectTo = new URLSearchParams(window.location.search).get('redirect-to') || '/app';
                    window.location.href = redirectTo;
                } else {
                    // Login failed
                    errorMsg.textContent = data.message || 'Invalid credentials. Please try again.';
                    errorMsg.classList.add('show');
                }
            } else {
                // Login failed - handle different error formats
                let errorText = 'Invalid credentials. Please try again.';
                if (data.message) {
                    errorText = typeof data.message === 'string' ? data.message : JSON.stringify(data.message);
                } else if (data.exc) {
                    errorText = typeof data.exc === 'string' ? data.exc : 'An error occurred during login.';
                } else if (data.error) {
                    errorText = typeof data.error === 'string' ? data.error : JSON.stringify(data.error);
                }
                errorMsg.textContent = errorText;
                errorMsg.classList.add('show');
            }
        } catch (err) {
            console.error('Login error:', err);
            errorMsg.textContent = 'Unable to connect. Please check your network and try again.';
            errorMsg.classList.add('show');
        }

        btnSignin.classList.remove('loading');
    });

    // Auto-focus on email field
    document.getElementById('login_email').focus();
</script>

</body>
</html>
